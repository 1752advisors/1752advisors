<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="1752Advisors - Coming Soon. We're launching our new website." />
        <meta name="author" content="1752Advisors" />
        <title>1752Advisors - Coming Soon</title>
        <link rel="icon" type="image/png" sizes="32x32" href="assets/img/1752_Advisors_Logo.png" />
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon" />
        <!-- Apple touch icons for iOS devices (fallback to site logo) -->
        <link rel="apple-touch-icon" sizes="180x180" href="assets/img/1752_Advisors_Logo.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="assets/img/1752_Advisors_Logo.png" />
        <link rel="apple-touch-icon" sizes="120x120" href="assets/img/1752_Advisors_Logo.png" />
        <link rel="apple-touch-icon" sizes="76x76" href="assets/img/1752_Advisors_Logo.png" />
        <link rel="manifest" href="site.webmanifest" />
        <!-- PWA & theme -->
        <meta name="theme-color" content="#ffffff" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&amp;display=swap" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Background Video-->
        <video class="bg-video" playsinline="playsinline" autoplay="autoplay" muted="muted" loop="loop"><source src="assets/mp4/bg.mp4" type="video/mp4" /></video>
        <!-- Masthead-->
        <div class="masthead">
            <div class="masthead-content text-white">
                <div class="container-fluid px-4 px-lg-0">
                    <h1 class="fst-italic lh-1 mb-4">
                        <img src="assets/img/1752_Advisors_Logo.png" alt="1752 Advisors" class="img-fluid" style="margin-left: -25px;" />
                    </h1>
                    <p class="mb-5">We're working hard to finish the development of this site. Sign up below to receive updates and to be notified when we launch!</p>
                    <!-- Formspree Contact Form -->
                    <div data-fs-success="">
                        <div class="text-center mb-3 mt-2">
                            <div class="fw-bolder text-success">Thanks! We'll be in touch soon.</div>
                        </div>
                    </div>
                    <div data-fs-error="">
                        <div class="text-center text-danger mb-3 mt-2">Error sending message. Please try again.</div>
                    </div>

                    <form id="contactForm" action="https://formspree.io/f/xvzljzwy" method="POST">
                        <!-- Email address input-->
                        <div class="row input-group-newsletter">
                            <div class="col"><input class="form-control" id="email" type="email" name="email" placeholder="Enter email address..." aria-label="Enter email address..." data-fs-field required /></div>
                            <div class="col-auto"><button class="btn btn-primary" id="submitButton" type="submit" data-fs-submit-btn>Notify Me!</button></div>
                        </div>
                        <span class="invalid-feedback mt-2" data-fs-error="email"></span>
                    </form>
                </div>
            </div>
        </div>
        <!-- Social Icons-->
        <!-- For more icon options, visit https://fontawesome.com/icons?d=gallery&p=2&s=brands-->
        <!-- <div class="social-icons">
            <div class="d-flex flex-row flex-lg-column justify-content-center align-items-center h-100 mt-3 mt-lg-0">
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-twitter"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-facebook-f"></i></a>
                <a class="btn btn-dark m-3" href="#!"><i class="fab fa-instagram"></i></a>
            </div>
        </div> -->
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <!-- Formspree AJAX -->
        <script src="https://unpkg.com/@formspree/ajax@1"></script>
        <script>
            window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
            formspree('initForm', { formElement: document.getElementById('contactForm'), formId: 'xvzljzwy' });
        </script>
    </body>
</html>
